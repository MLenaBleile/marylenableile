<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/png" href="{{ '/media/symbol.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <nav class="site-nav">
        {% for link in site.navigation %}
          {% if link.external %}
            <a href="{{ link.url }}" target="_blank" rel="noopener"
               class="nav-link">{{ link.title }}</a>
          {% else %}
            <a href="{{ link.url | prepend: site.baseurl }}"
               class="nav-link {% if page.url == link.url %}active{% endif %}">{{ link.title }}</a>
          {% endif %}
        {% endfor %}
      </nav>
      <a href="{{ '/' | relative_url }}" class="header-symbol">
        <img src="{{ '/media/symbol.png' | relative_url }}" alt="MaryLena Bleile">
      </a>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="{{ '/media/symbol.png' | relative_url }}" alt="">
        <span class="footer-tagline">Bayesian Models &middot; Causal RL &middot; Optimal Control</span>
      </div>
      <div class="footer-right">
        <div class="footer-links">
          <a href="https://www.linkedin.com/in/marylenableile/" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://scholar.google.com/citations?hl=en&user=NTmz-a0AAAAJ" target="_blank" rel="noopener">Scholar</a>
          <a href="https://github.com/MLenaBleile" target="_blank" rel="noopener">GitHub</a>
          <a href="mailto:marylenableile@gmail.com">Email</a>
        </div>
        <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} MaryLena Bleile</p>
      </div>
    </div>
  </footer>

</body>
</html>
